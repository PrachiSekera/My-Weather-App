<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold">Weather App</a>

    <div class="d-flex flex-column">
      <div class="d-flex">
        <input id="city-input" class="form-control me-2" type="search" placeholder="Enter city">
        <button id="search-btn" class="btn btn-outline-light" type="button">Search</button>
      </div>
    </div>
  </div>
</nav>

<!-- Main Container -->
<div class="container mt-5">

  <!-- Top Weather Cards -->
  <h2 class="text-center mb-4">Check Weather</h2>
  <div class="row text-center">

    <div class="col-md-4 mb-3">
      <div class="card shadow-sm weather-card">
        <div class="card-header">Temperature</div>
        <div class="card-body">
          <h2 id="temp">--</h2>
          <p class="text-muted">Current Temperature</p>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow-sm weather-card">
        <div class="card-header">Weather</div>
        <div class="card-body">
          <h2 id="weather">--</h2>
          <p class="text-muted">Condition</p>
        </div>
      </div>
    </div>

    <div class="col-md-4 mb-3">
      <div class="card shadow-sm weather-card">
        <div class="card-header">Humidity</div>
        <div class="card-body">
          <h2 id="humidity">--</h2>
          <p class="text-muted">Humidity Level</p>
        </div>
      </div>
    </div>

  </div>

  <!-- More Weather Details -->
  <h4 class="text-center mt-4 mb-3">More Details</h4>
  <div class="table-responsive">
    <table class="table table-bordered text-center table-hover">
      <thead class="table-primary">
        <tr>
          <th>City</th>
          <th>Feels Like</th>
          <th>Min Temp</th>
          <th>Max Temp</th>
          <th>Pressure</th>
          <th>Visibility</th>
          <th>UV Index</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td id="city-name">--</td>
          <td id="feels-like">--</td>
          <td id="min-temp">--</td>
          <td id="max-temp">--</td>
          <td id="pressure">--</td>
          <td id="visibility">--</td>
          <td id="uv-index">--</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Error / Result Message -->
  <p id="result" class="text-center text-danger mt-3"></p>

</div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
